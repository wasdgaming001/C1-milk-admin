# ============================================================================
# MILK DELIVERY ADMIN — V17
# netlify.toml
# ============================================================================

[build]
  publish = "dist"
  command = "npm run build"

[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

[functions."proxy"]
  node_version = "20"

# ── Redirect: /api -> proxy function ─────────────────────────────────────────
[[redirects]]
  from   = "/api"
  to     = "/.netlify/functions/proxy"
  status = 200

# ── Security headers (all routes) ────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'"
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "geolocation=(), microphone=(), camera=()"

# Service worker must never be cached — browsers must always fetch the latest.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control          = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# Fix #11 — Vite outputs content-hashed bundles to /assets/, not /static/.
# The old rule `for = "/static/*"` never matched anything; this one does.
# content-hashed filenames are immutable, so one-year cache is safe.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Rate limiting note ────────────────────────────────────────────────────────
# In-process rate limiting (JS Maps) resets on every cold start and is NOT
# reliable. Use Netlify Dashboard → Security → WAF instead:
#   Path: /api
#   Rule: 60 requests / minute / IP
#   Action: Block (429)