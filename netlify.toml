

# ============================================================================
# MILK DELIVERY ADMIN — V17
# netlify.toml
# ============================================================================

[build]
  publish = "."          # serve everything in the root directory as static files
  command = "echo 'No build step needed — static HTML/JS/CSS'"

[functions]
  directory     = "netlify/functions"
  node_bundler  = "esbuild"           # faster cold starts than zip bundler

[functions."proxy"]
  node_version = "20"

# ── Redirect: /api/* -> proxy function ───────────────────────────────────────
# The frontend calls /api (a relative URL) — Netlify rewrites it to the
# function transparently. This keeps the Apps Script URL off the client.
[[redirects]]
  from   = "/api"
  to     = "/.netlify/functions/proxy"
  status = 200

# ── Security headers (applied to all routes) ─────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'"
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "geolocation=(), microphone=(), camera=()"

# Service worker must not be cached so browsers always get the latest version
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control          = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# Static assets (icons, fonts, etc.) can be cached for a year
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Rate limiting note ────────────────────────────────────────────────────────
# In-process rate limiting (JS Maps) resets on every cold start and is NOT
# reliable. Use Netlify Dashboard → Security → WAF instead:
#   Path: /api
#   Rule: 60 requests / minute / IP
#   Action: Block (429)