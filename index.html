<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1e40af" />
  <meta name="description" content="Milk Delivery Admin — door-step milk delivery management" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MilkAdmin" />

  <title>Milk Admin V17</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="/app.css" />

  <style>
    /* ── Login screen ───────────────────────────────────────────────────── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      background: #1e40af;
      padding: 24px;
      box-sizing: border-box;
    }
    #login-screen.hidden { display: none; }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 340px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .login-logo { font-size: 40px; margin-bottom: 8px; }
    .login-title { font-size: 20px; font-weight: 700; color: #1e40af; margin: 0 0 4px; }
    .login-sub   { font-size: 13px; color: #6b7280; margin: 0 0 24px; }

    .pin-dots {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 24px;
    }
    .pin-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid #d1d5db;
      background: #fff;
      transition: background .15s, border-color .15s;
    }
    .pin-dot.filled { background: #1e40af; border-color: #1e40af; }

    .pin-keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .pin-key {
      padding: 14px 0;
      font-size: 20px;
      font-weight: 600;
      color: #111;
      background: #f3f4f6;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .pin-key:active { background: #dbeafe; }
    .pin-key.wide   { grid-column: span 2; font-size: 14px; color: #6b7280; }
    .pin-key.back   { color: #ef4444; }

    #login-error {
      margin-top: 16px;
      font-size: 13px;
      color: #991b1b;
      background: #fee2e2;
      border-radius: 8px;
      padding: 8px 12px;
      display: none;
    }
    #login-error.visible { display: block; }

    #login-loading {
      margin-top: 16px;
      font-size: 13px;
      color: #6b7280;
      display: none;
    }
    #login-loading.visible { display: flex; align-items: center; justify-content: center; gap: 8px; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #d1d5db;
      border-top-color: #1e40af;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── App root ───────────────────────────────────────────────────────── */
    #app-root { display: none; }
    #app-root.visible { display: block; }

    /* ── Global toast (used by app.js before React mounts) ─────────────── */
    #global-toast {
      position: fixed;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e40af;
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 99999;
      display: none;
      max-width: 320px;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- ── Global toast (pre-React, used by app.js) ──────────────────────────── -->
<div id="global-toast"></div>

<!-- ── Login Screen ──────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🥛</div>
    <h1 class="login-title">Milk Admin</h1>
    <p class="login-sub">Enter your 4-digit PIN</p>

    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
    </div>

    <div class="pin-keypad" id="pin-keypad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key wide" onclick="pinClear()">Clear</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key back" onclick="pinBack()">⌫</button>
    </div>

    <div id="login-error"></div>
    <div id="login-loading">
      <div class="spinner"></div>
      <span>Verifying…</span>
    </div>
  </div>
</div>

<!-- ── App Root (React mounts here after login) ───────────────────────────── -->
<div id="app-root"></div>

<!-- ── Scripts ───────────────────────────────────────────────────────────── -->
<!-- app.js: write queue, apiCall, service worker bootstrap (plain JS, loaded before React) -->
<script src="/app.js"></script>

<!-- Vite entry — React + ReactDOM + your app code are all bundled together -->
<script type="module" src="/src/main.jsx"></script>

<script>
// ── Global showToast (pre-React, available to app.js) ────────────────────────
window.showToast = function(msg, type = 'info', duration = 3000) {
  const el = document.getElementById('global-toast');
  if (!el) return;
  const colors = { info:'#1e40af', success:'#166534', warning:'#854d0e', error:'#991b1b' };
  el.textContent = msg;
  el.style.background = colors[type] || colors.info;
  el.style.display = 'block';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.style.display = 'none'; }, duration);
};

// ── PIN login logic ───────────────────────────────────────────────────────────
let _pin = '';

function pinKey(digit) {
  if (_pin.length >= 4) return;
  _pin += digit;
  _renderDots();
  if (_pin.length === 4) _submitPIN();
}

function pinBack() {
  _pin = _pin.slice(0, -1);
  _renderDots();
  _clearError();
}

function pinClear() {
  _pin = '';
  _renderDots();
  _clearError();
}

function _renderDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('dot-' + i)?.classList.toggle('filled', i < _pin.length);
  }
}

function _clearError() {
  const el = document.getElementById('login-error');
  if (el) { el.textContent = ''; el.classList.remove('visible'); }
}

function _showError(msg) {
  const el = document.getElementById('login-error');
  if (el) { el.textContent = msg; el.classList.add('visible'); }
  _pin = '';
  _renderDots();
}

function _setLoading(on) {
  document.getElementById('login-loading')?.classList.toggle('visible', on);
  document.getElementById('pin-keypad')?.querySelectorAll('button').forEach(b => { b.disabled = on; });
}

async function _finishLogin(data) {
  if (data.success) {
    saveSession(data.data.token, data.data.sessionSecret);
    sessionStorage.setItem('milkapp_expires', String(data.data.expiresAt || 0)); // ADD THIS
    _showApp();
    return true;
  }

  const code = data.error?.code;
  if (code === 'RATE_LIMITED') {
    _showError('Too many attempts. Try again tomorrow.');
  } else if (code === 'INVALID_PIN') {
    _showError('Incorrect PIN. Please try again.');
  } else if (code === 'NOT_CONFIGURED') {
    _showError('PIN not yet set up. Creating your first PIN…');
  } else {
    _showError(data.error?.message || 'Login failed. Try again.');
  }
  return false;
}

async function _setupInitialPIN(pin) {
  const setupRes = await fetch('/api', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'rotatePIN', payload: { newPin: pin, confirmPin: pin } }),
  });
  const setupData = await setupRes.json();

  if (!setupData.success) {
    _showError(setupData.error?.message || 'Unable to create PIN.');
    return false;
  }

  const verifyRes = await fetch('/api', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'verifyPIN', payload: { pin } }),
  });
  const verifyData = await verifyRes.json();
  return _finishLogin(verifyData);
}

async function _submitPIN() {
  _setLoading(true);
  _clearError();
  try {
    const res = await fetch('/api', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'verifyPIN', payload: { pin: _pin } }),
    });
    const data = await res.json();

    if (data.success) {
      await _finishLogin(data);
    } else if (data.error?.code === 'NOT_CONFIGURED') {
      await _setupInitialPIN(_pin);
    } else {
      await _finishLogin(data);
    }
  } catch (err) {
    _showError('Network error. Check your connection.');
  } finally {
    _pin = '';
    _renderDots();
    _setLoading(false);
  }
}

// ── FIX: React already mounted by main.jsx, just reveal it ──────────────────
function _showApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-root').classList.add('visible');
}

// ── Check if already logged in (e.g. page refresh within the same tab) ────────
window.addEventListener('load', () => {
  const token   = sessionStorage.getItem('milkapp_token');
  const expires = Number(sessionStorage.getItem('milkapp_expires') || 0);
  // Skip if token missing OR already expired client-side
  if (!token || (expires && Date.now() > expires)) {
    sessionStorage.removeItem('milkapp_token');
    sessionStorage.removeItem('milkapp_secret');
    sessionStorage.removeItem('milkapp_expires');
    return;
  }
  fetch('/api', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'healthCheck',
      token: token,
      sessionSecret: sessionStorage.getItem('milkapp_secret') || '',
    }),
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) _showApp();
    // If session expired the fetch will return UNAUTHORIZED which clears
    // the session in apiCall's interceptor, then the login screen stays
  })
  .catch(() => { /* network down — show login */ });
});
</script>
</body>
</html>
