<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1e40af" />
  <meta name="description" content="Milk Delivery Admin — door-step milk delivery management" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MilkAdmin" />

  <title>Milk Admin V17</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="/app.css" />

  <style>
    /* ── Login screen ───────────────────────────────────────────────────── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      background: #1e40af;
      padding: 24px;
      box-sizing: border-box;
    }
    #login-screen.hidden { display: none; }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 340px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .login-logo { font-size: 40px; margin-bottom: 8px; }
    .login-title { font-size: 20px; font-weight: 700; color: #1e40af; margin: 0 0 4px; }
    .login-sub   { font-size: 13px; color: #6b7280; margin: 0 0 24px; }

    .pin-dots {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 24px;
    }
    .pin-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 2px solid #d1d5db;
      background: #fff;
      transition: background .15s, border-color .15s;
    }
    .pin-dot.filled { background: #1e40af; border-color: #1e40af; }

    .pin-keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .pin-key {
      padding: 14px 0;
      font-size: 20px;
      font-weight: 600;
      color: #111;
      background: #f3f4f6;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .pin-key:active { background: #dbeafe; }
    .pin-key.wide   { grid-column: span 2; font-size: 14px; color: #6b7280; }
    .pin-key.back   { color: #ef4444; }

    #login-error {
      margin-top: 16px;
      font-size: 13px;
      color: #991b1b;
      background: #fee2e2;
      border-radius: 8px;
      padding: 8px 12px;
      display: none;
    }
    #login-error.visible { display: block; }

    #login-loading {
      margin-top: 16px;
      font-size: 13px;
      color: #6b7280;
      display: none;
    }
    #login-loading.visible { display: flex; align-items: center; justify-content: center; gap: 8px; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #d1d5db;
      border-top-color: #1e40af;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── App root ───────────────────────────────────────────────────────── */
    #app-root { display: none; }
    #app-root.visible { display: block; }

    /* ── Global toast (used by app.js before React mounts) ─────────────── */
    #global-toast {
      position: fixed;
      bottom: 72px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e40af;
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 99999;
      display: none;
      max-width: 320px;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- ── Global toast (pre-React, used by app.js) ──────────────────────────── -->
<div id="global-toast"></div>

<!-- ── Login Screen ──────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🥛</div>
    <h1 class="login-title">Milk Admin</h1>
    <p class="login-sub">Enter your 4-digit PIN</p>

    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
    </div>

    <div class="pin-keypad" id="pin-keypad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key wide" onclick="pinClear()">Clear</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key back" onclick="pinBack()">⌫</button>
    </div>

    <div id="login-error"></div>
    <div id="login-loading">
      <div class="spinner"></div>
      <span>Verifying…</span>
    </div>
  </div>
</div>

<!-- ── App Root (React mounts here after login) ───────────────────────────── -->
<div id="app-root"></div>

<!-- Vite entry — React + ReactDOM + your app code are all bundled together -->
<script type="module" src="/src/main.jsx"></script>

</body>
</html>
